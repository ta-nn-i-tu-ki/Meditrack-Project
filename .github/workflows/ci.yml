name: MediTrack CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore MediTrack.sln

    - name: Build
      run: dotnet build MediTrack.sln --no-restore

    - name: Test
      run: dotnet test MediTrack.sln --no-build --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: meditrack-ui/package-lock.json

    - name: Install dependencies
      working-directory: ./meditrack-ui
      run: npm ci

    - name: Build Next.js
      working-directory: ./meditrack-ui
      run: npm run build
